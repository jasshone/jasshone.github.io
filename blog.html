<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Jasmine Shone</title>
    <link rel="icon" type="image/svg+xml" href="images/cat.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Newsreader:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --text-light: #777777;
            --accent: #A31F34; /* MIT Red */
            --link: #111111;
            --link-hover: #A31F34;
            --max-width: 960px; 
        }

        /* Global Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Newsreader', serif;
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            font-size: 18px;
        }

        h1, h2, h3, h4, .sans { font-family: 'Inter', sans-serif; }

        a { text-decoration: none; color: var(--link); transition: color 0.2s; }
        a:hover { color: var(--link-hover); }
        
        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 4rem 20px;
        }

        /* --- Header / Nav --- */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            font-family: 'Inter', sans-serif;
        }

        .logo {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }

        .nav-links a {
            color: var(--text-muted);
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }

        /* --- Page Title --- */
        .page-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 2rem;
        }

        /* --- Blog List (Clean Grid Style) --- */
        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .blog-row {
            display: grid;
            grid-template-columns: 140px 1fr; /* Date Column | Content Column */
            gap: 30px;
            align-items: baseline;
            opacity: 0; /* For animation */
            animation: fadeIn 0.5s ease forwards;
        }

        .blog-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-light);
            text-align: right;
            padding-top: 6px; /* Optical alignment with title */
        }

        .blog-content h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .blog-excerpt {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .read-more {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            color: var(--accent);
        }

        .read-more:hover {
            text-decoration: underline;
        }

        /* Loading / Error States */
        .loading, .error {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .error { color: var(--accent); }

        /* Animation Keyframes */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .blog-row {
                grid-template-columns: 1fr;
                gap: 5px;
            }
            .blog-date {
                text-align: left;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="nav-header">
            <div class="logo"><a href="index.html">Jasmine Shone</a></div>
            <nav class="nav-links">
                <a href="index.html#research">Research</a>
                <a href="index.html#experience">Experience</a>
                <a href="blog.html" class="active">Blog</a>
            </nav>
        </header>

        <h1 class="page-title sans">Blog</h1>
        <div class="page-subtitle sans">Thoughts on research, code, and other things.</div>

        <div id="blog-list" class="blog-list">
            <div class="loading">Loading posts...</div>
        </div>

        <div style="text-align:center; padding: 60px 0; color: #999; font-size: 0.8rem; font-family:'Inter',sans-serif;">
            &copy; 2025 Jasmine Shone. 
        </div>
    </div>

    <script>
        async function loadRecentPosts() {
            try {
                // Fetch the list of posts
                const res = await fetch('posts.json');
                if (!res.ok) throw new Error(`Failed to load posts.`);
                
                const posts = await res.json();
    
                // Sort by date (newest first)
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    
                const blogList = document.getElementById('blog-list');
                blogList.innerHTML = ''; // Clear loading
                
                if (posts.length === 0) {
                    blogList.innerHTML = '<div class="loading">No posts found.</div>';
                    return;
                }
    
                posts.forEach((post, index) => {
                    const article = document.createElement('article');
                    article.className = 'blog-row';
                    // Stagger animation slightly
                    article.style.animationDelay = `${index * 0.1}s`;
                    
                    // Format Date nicely
                    const dateObj = new Date(post.date);
                    const dateStr = dateObj.toLocaleDateString('en-US', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric' 
                    });

                    // Link to your existing markdown viewer
                    const markdownViewerUrl = `markdown-viewer.html?file=${encodeURIComponent(post.link)}&title=${encodeURIComponent(post.title)}`;
                    
                    // The new clean HTML structure
                    article.innerHTML = `
                        <div class="blog-date">${dateStr}</div>
                        <div class="blog-content">
                            <h2><a href="${markdownViewerUrl}">${post.title}</a></h2>
                            <p class="blog-excerpt">${post.excerpt}</p>
                            <a href="${markdownViewerUrl}" class="read-more">Read Entry &rarr;</a>
                        </div>
                    `;
                    
                    blogList.appendChild(article);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('blog-list').innerHTML = `
                    <div class="error">
                        Could not load posts. Please check posts.json.
                    </div>
                `;
            }
        }
    
        document.addEventListener('DOMContentLoaded', loadRecentPosts);
    </script>
</body>
</html>
